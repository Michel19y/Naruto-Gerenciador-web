<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Ninjas</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <i class="fa-solid fa-user-ninja header-logo"></i>
      <h1>Gerenciador de Ninjas</h1>
    </div>
    <div class="header-actions">
      <button id="btn-filter" class="btn btn-ghost" type="button">
        <i class="fa-solid fa-filter"></i>
        <span>Filtrar</span>
      </button>
      <button id="btn-refresh" class="btn btn-ghost btn-icon-only" type="button" title="Atualizar">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
      <button id="btn-add" class="btn btn-primary" type="button">
        <i class="fa-solid fa-plus"></i>
        <span>Ninja</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Carregando ninjas...</p>
    </div>

    <div id="empty-state" class="empty-state hidden">
      <i class="fa-solid fa-user-ninja empty-icon"></i>
      <p id="empty-message">Nenhum ninja cadastrado.</p>
      <button id="btn-clear-filters" class="btn btn-ghost hidden" type="button">
        <i class="fa-solid fa-xmark"></i> Limpar Filtros
      </button>
    </div>

    <div id="cards-grid" class="cards-grid hidden"></div>
  </main>

  <!-- Modal: Adicionar Ninja -->
  <div id="modal-add" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">
          <i class="fa-solid fa-plus"></i> Adicionar Ninja
        </h2>
        <button class="modal-close" type="button" id="btn-add-cancel" title="Fechar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" for="add-ninja">Nome do ninja</label>
          <input id="add-ninja" type="text" class="input" placeholder="Ex: Naruto Uzumaki">
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="add-preco">Preço por fragmento</label>
            <input id="add-preco" type="number" class="input" placeholder="Ex: 150">
          </div>
          <div class="field-group">
            <label class="field-label" for="add-estrelas">Estrelas <span class="field-hint">(opcional)</span></label>
            <input id="add-estrelas" type="number" class="input" placeholder="4 ou 5">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="add-frag-total">Fragmentos necessários</label>
            <input id="add-frag-total" type="number" class="input" placeholder="Ex: 100">
          </div>
          <div class="field-group">
            <label class="field-label" for="add-frag-falta">
              Quantos falta <span class="field-hint">(do jogo)</span>
            </label>
            <input id="add-frag-falta" type="number" class="input" placeholder="Ex: 40">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Elemento</label>
          <div id="add-elemento-options" class="options-container"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Coleção / Origem</label>
          <div id="add-colecao-options" class="options-container"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-add-save" class="btn btn-primary btn-full" type="button">
          <i class="fa-solid fa-plus"></i> Adicionar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Editar Ninja -->
  <div id="modal-edit" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="edit-modal-title">
          <i class="fa-solid fa-pen"></i> Editar Ninja
        </h2>
        <button class="modal-close" type="button" id="btn-edit-cancel" title="Fechar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" for="edit-ninja">Nome do ninja</label>
          <input id="edit-ninja" type="text" class="input input-readonly" readonly>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="edit-preco">Preço por fragmento</label>
            <input id="edit-preco" type="number" class="input" placeholder="Ex: 150">
          </div>
          <div class="field-group">
            <label class="field-label" for="edit-estrelas">Estrelas <span class="field-hint">(opcional)</span></label>
            <input id="edit-estrelas" type="number" class="input" placeholder="4 ou 5">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="edit-frag-total">Fragmentos necessários</label>
            <input id="edit-frag-total" type="number" class="input" placeholder="Ex: 100">
          </div>
          <div class="field-group">
            <label class="field-label" for="edit-frag-falta">
              Quantos falta <span class="field-hint">(do jogo)</span>
            </label>
            <input id="edit-frag-falta" type="number" class="input" placeholder="Ex: 40">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Elemento</label>
          <div id="edit-elemento-options" class="options-container"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Coleção / Origem</label>
          <div id="edit-colecao-options" class="options-container"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-edit-save" class="btn btn-primary btn-full" type="button">
          <i class="fa-solid fa-floppy-disk"></i> Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Filtrar e Ordenar -->
  <div id="modal-filter" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">
          <i class="fa-solid fa-filter"></i> Filtrar e Ordenar
        </h2>
        <button class="modal-close" type="button" id="btn-filter-cancel" title="Fechar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label" for="filter-text">Nome do ninja</label>
            <input id="filter-text" type="text" class="input" placeholder="Buscar...">
          </div>
          <div class="field-group">
            <label class="field-label" for="filter-estrelas">Estrelas</label>
            <input id="filter-estrelas" type="number" class="input" placeholder="4 ou 5">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Elemento</label>
          <div id="filter-elemento-options" class="options-container"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Coleção / Origem</label>
          <div id="filter-colecao-options" class="options-container"></div>
        </div>
        <div class="field-group">
          <label class="field-label">Ordenar por</label>
          <div id="filter-sort-options" class="options-container"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-filter-apply" class="btn btn-primary btn-full" type="button">
          <i class="fa-solid fa-magnifying-glass"></i> Aplicar Filtros
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Confirmar Exclusão -->
  <div id="modal-confirm" class="modal-overlay hidden">
    <div class="modal modal-small">
      <div class="modal-header modal-header-danger">
        <h2 class="modal-title">
          <i class="fa-solid fa-triangle-exclamation"></i> Confirmar Exclusão
        </h2>
      </div>
      <p class="confirm-message" id="confirm-message"></p>
      <div class="modal-footer modal-footer-split">
        <button id="btn-confirm-no" class="btn btn-ghost" type="button">Cancelar</button>
        <button id="btn-confirm-yes" class="btn btn-danger" type="button">
          <i class="fa-solid fa-trash"></i> Excluir
        </button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
